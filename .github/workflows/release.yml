name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Setup Android signing
        id: signing
        uses: ./.github/actions/setup-signing
        with:
          keystore_base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.AEGISINPUT_RELEASE_KEYSTORE_B64 }}
          keystore_password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.AEGISINPUT_RELEASE_STORE_PASSWORD }}
          key_alias: ${{ secrets.ANDROID_KEY_ALIAS || secrets.AEGISINPUT_RELEASE_KEY_ALIAS }}
          key_password: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.AEGISINPUT_RELEASE_KEY_PASSWORD }}
          app_name: "Aegis Input"
          organization: "cmwen"

      - name: Assemble release APK
        env:
          AEGISINPUT_RELEASE_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          AEGISINPUT_RELEASE_KEY_ALIAS: ${{ steps.signing.outputs.key_alias }}
          AEGISINPUT_RELEASE_KEY_PASSWORD: ${{ steps.signing.outputs.key_password }}
          AEGISINPUT_RELEASE_STORE_PASSWORD: ${{ steps.signing.outputs.keystore_password }}
        run: gradle --stacktrace :app:assembleRelease

      - name: Save signing credentials for persistence
        if: steps.signing.outputs.is_auto_generated == 'true'
        run: |
          mkdir -p build/signing-credentials
          cat > build/signing-credentials/signing-credentials.json << EOF
          {
            "keystore_base64": "${{ steps.signing.outputs.keystore_base64 }}",
            "keystore_password": "${{ steps.signing.outputs.keystore_password }}",
            "key_alias": "${{ steps.signing.outputs.key_alias }}",
            "key_password": "${{ steps.signing.outputs.key_password }}"
          }
          EOF

          cat > build/signing-credentials/README.txt << 'EOF'
          Download this artifact and run:
          ./scripts/signing/persist-credentials.sh ./signing-credentials.json

          That will save these values as GitHub repository secrets:
          - ANDROID_KEYSTORE_BASE64
          - ANDROID_KEYSTORE_PASSWORD
          - ANDROID_KEY_ALIAS
          - ANDROID_KEY_PASSWORD
          EOF

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-input-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signing credentials
        if: steps.signing.outputs.is_auto_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signing-credentials-${{ github.ref_name }}
          path: build/signing-credentials/*
          retention-days: 7

      - name: Upload ProGuard mapping
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-input-proguard-mapping
          path: app/build/outputs/mapping/release/
          if-no-files-found: warn

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk

      - name: Clean up signing files
        if: always()
        run: |
          rm -f "${{ steps.signing.outputs.keystore_path }}"
          rm -rf build/signing-credentials
